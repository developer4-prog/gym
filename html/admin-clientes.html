<!doctype html>
<html lang="es">
  <head>
    <meta
      name="description"
      content="Gym App: registra entrenamientos, revisa asistencia, consulta rutinas y gestiona tu progreso en el gimnasio."
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="../manifest.json" />
    <meta name="theme-color" content="#111111" />
    <link rel="icon" href="../imagenes/icon-192.png" />
    <link rel="apple-touch-icon" href="../imagenes/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Gym App" />

    <title>Clientes</title>

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/admin.css" />
  </head>

  <body>
    <div class="admin-container">
      <h1>Clientes registrados</h1>
      <p class="subtitle">Lista de usuarios del gimnasio</p>

      <div class="search-box">
        <input
          type="text"
          id="buscarCliente"
          placeholder="Buscar cliente por nombre..."
        />
      </div>

      <div id="clientes-lista" class="clientes-grid">
        <p>Cargando clientes...</p>
      </div>

      <a href="admin.html" class="btn-volver">← Volver</a>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/admin-clientes.js" defer></script>
    <script src="../js/sw-update.js" defer></script>
    <script src="../js/ui-state.js" defer></script>
    <script src="../js/admin-guard.js"></script>
  </body>
</html>
