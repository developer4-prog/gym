<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="manifest" href="../manifest.json" />
    <meta name="theme-color" content="#111111" />

    <link rel="icon" href="../imagenes/icon-192.png" />
    <link rel="apple-touch-icon" href="../imagenes/icon-192.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <meta name="apple-mobile-web-app-title" content="Gym App" />

    <title>Registra tu Entrenamiento</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/workout.css" />
  </head>

  <body>
    <div class="dashboard">
      <h2>💪 Registrar entrenamiento</h2>

      <p>Selecciona los músculos que entrenaste hoy</p>

      <div class="muscle-grid">
        <button class="muscle-btn">Pecho</button>
        <button class="muscle-btn">Espalda</button>
        <button class="muscle-btn">Piernas</button>
        <button class="muscle-btn">Hombros</button>
        <button class="muscle-btn">Bíceps</button>
        <button class="muscle-btn">Tríceps</button>
        <button class="muscle-btn">Abdomen</button>
        <button class="muscle-btn">Cardio</button>
      </div>

      <button class="btn-save">Guardar entrenamiento</button>
    </div>

    <!-- cargar Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Tu configuración -->
    <script src="../js/firebase-config.js"></script>

    <!-- Tu JS de funcionalidad -->
    <script src="../js/workout.js"></script>
    <script src="../js/historial.js"></script>

    <!-- MENU INFERIOR -->

    <div class="bottom-nav">
      <a href="dashboard.html" class="nav-item">🏠</a>
      <a href="historial.html" class="nav-item">📅</a>
      <a href="workout.html" class="nav-item active">💪</a>
      <a href="tienda.html" class="nav-item">🛒</a>
      <a href="gym-info.html" class="nav-item">🏋️</a>
    </div>
  </body>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/gym/service-worker.js")
          .then(() => console.log("Service Worker registrado"))
          .catch((err) => console.log("Error registrando Service Worker", err));
      });
    }
  </script>
</html>
