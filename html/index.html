<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gym App</title>
    <link rel="icon" href="../imagenes/icon-192.png" />

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/index.css" />
  </head>

  <body class="center-page">
    <!-- PARTICULAS -->
    <div id="particles-js"></div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="app-container" id="main-content">
      <img src="../imagenes/LOGO.png" class="logo" />

      <h1 class="welcome" id="welcomeUser">Te estaba esperando</h1>

      <p class="motivational" id="motivationalText"></p>

      <button class="btn-enter" onclick="goLogin()">Entrar</button>

      <button id="installBtn" class="install-btn" hidden>
        📲 Instalar app
      </button>
    </div>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/motivacion.js"></script>
    <script src="../js/welcome.js"></script>

    <!-- PARTICULAS -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <script src="../js/particles-config.js"></script>

    <!-- CONTROL SPLASH -->
    <script src="../js/splash.js"></script>

    <!-- INSTALL -->
    <script src="../js/install.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/gym/service-worker.js")
            .then(() => console.log("SW registrado desde html/index"))
            .catch((err) => console.log("Error SW", err));
        });
      }
    </script>
  </body>
</html>
