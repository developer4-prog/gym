<!doctype html>
<html lang="es">
  <head>
    <meta
      name="description"
      content="Gym App: registra entrenamientos, revisa asistencia, consulta rutinas y gestiona tu progreso en el gimnasio."
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="../manifest.json" />
    <meta name="theme-color" content="#111111" />
    <link rel="icon" href="../imagenes/icon-192.png" />
    <link rel="apple-touch-icon" href="../imagenes/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Gym App" />

    <title>Gym App</title>

    <link rel="icon" href="/gym/imagenes/icon-192.png" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/index.css" />
  </head>

  <body class="center-page">
    <div class="app-container" id="main-content">
      <img src="../imagenes/LOGO.png" class="logo" alt="Logo Gym App" />

      <h1 class="welcome" id="welcomeUser">Te estaba esperando</h1>

      <p class="motivational" id="motivationalText"></p>

      <button class="btn-enter" onclick="goLogin()">Entrar</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/motivacion.js" defer></script>
    <script src="../js/index-session-check.js"></script>
    <script src="../js/sw-update.js" defer></script>
  </body>
</html>
