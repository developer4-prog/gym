<!doctype html>
<html lang="es">
  <head>
    <link rel="manifest" href="../manifest.json" />
    <meta name="theme-color" content="#111111" />

    <link rel="icon" href="../imagenes/icon-192.png" />
    <link rel="apple-touch-icon" href="../imagenes/icon-192.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Gym App" />
    <title>Historial</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/historial.css" />
  </head>

  <body>
    <div class="container">
      <h2 class="calendar-title">📅 Historial de entrenamientos</h2>

      <div class="calendar-box">
        <div id="month-title"></div>

        <div class="week-days">
          <div>Dom</div>
          <div>Lun</div>
          <div>Mar</div>
          <div>Mié</div>
          <div>Jue</div>
          <div>Vie</div>
          <div>Sáb</div>
        </div>

        <div id="calendar"></div>
      </div>

      <div id="workout-info"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script src="../js/firebase-config.js"></script>

    <script src="../js/historial.js"></script>

    <div class="bottom-nav">
      <a href="dashboard.html" class="nav-item">🏠</a>
      <a href="historial.html" class="nav-item active">📅</a>
      <a href="workout.html" class="nav-item">💪</a>
      <a href="tienda.html" class="nav-item">🛒</a>
      <a href="gym-info.html" class="nav-item">🏋️</a>
    </div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/gym/service-worker.js")
            .then(() => console.log("Service Worker registrado"))
            .catch((err) =>
              console.log("Error registrando Service Worker", err),
            );
        });
      }
    </script>
  </body>
</html>
