<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="../manifest.json" />
    <meta name="theme-color" content="#111111" />
    <link rel="icon" href="../imagenes/icon-192.png" />
    <link rel="apple-touch-icon" href="../imagenes/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Gym App" />

    <title>Ventas</title>

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/admin.css" />
  </head>

  <body>
    <div class="admin-container">
      <h1>Ventas</h1>
      <p class="subtitle">Registro rápido de bebidas y productos</p>

      <div class="ventas-resumen">
        <div class="venta-resumen-card">
          <span class="venta-resumen-label">Vendidos hoy</span>
          <strong id="ventasHoyCantidad">0</strong>
        </div>

        <div class="venta-resumen-card">
          <span class="venta-resumen-label">Total hoy</span>
          <strong id="ventasHoyTotal">$0.00</strong>
        </div>
      </div>

      <div id="productos-lista" class="productos-grid">
        <p class="empty-state">Cargando productos...</p>
      </div>

      <div class="admin-actions">
        <button id="btnExportarVentasHoy" class="btn-exportar">
          Exportar ventas de hoy
        </button>
      </div>
      <a href="admin.html" class="btn-volver">← Volver al panel admin</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/admin-ventas.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            await navigator.serviceWorker.register("/service-worker.js");
            console.log("Service Worker registrado");
          } catch (error) {
            console.error("Error registrando Service Worker", error);
          }
        });
      }
    </script>
  </body>
</html>
